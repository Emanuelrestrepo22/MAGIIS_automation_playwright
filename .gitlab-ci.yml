stages:
  - test

variables:
  PNPM_CACHE_FOLDER: "$CI_PROJECT_DIR/.pnpm-store"

.e2e_template:
  stage: test
  image: node:20
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm config set store-dir $PNPM_CACHE_FOLDER
    - pnpm install --frozen-lockfile
    - npx playwright install --with-deps chromium
  script:
    - mkdir -p storage
    - |
      echo "ENV=${ENV}" > .env.test
      echo "BASE_URL=${BASE_URL}" >> .env.test
      echo "AUTH_API_URL=${AUTH_API_URL}" >> .env.test
      echo "LOGIN_PATH=${LOGIN_PATH}" >> .env.test
      echo "DASHBOARD_URL_PATTERN=${DASHBOARD_URL_PATTERN}" >> .env.test
      echo "USER_CARRIER=${USER_CARRIER}" >> .env.test
      echo "PASS_CARRIER=${PASS_CARRIER}" >> .env.test
      echo "HEADLESS=true" >> .env.test
    - pnpm run test:test:smoke
  artifacts:
    when: always
    paths:
      - evidence/test/
    expire_in: 14 days

e2e-test:
  extends: .e2e_template
  environment:
    name: test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    ENV: test

e2e-uat:
  extends: .e2e_template
  environment:
    name: uat
  rules:
    - when: manual
  variables:
    ENV: uat

e2e-prod:
  extends: .e2e_template
  environment:
    name: prod
  rules:
    - when: manual
  variables:
    ENV: prod