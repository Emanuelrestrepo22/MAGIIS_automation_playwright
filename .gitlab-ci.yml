stages:
  - test

variables:
  PNPM_CACHE_FOLDER: "$CI_PROJECT_DIR/.pnpm-store"

.e2e_template:
  stage: test
  image: node:20
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store
  before_script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm config set store-dir $PNPM_CACHE_FOLDER
    - pnpm install --frozen-lockfile
    - npx playwright install --with-deps chromium
  script:
    - mkdir -p storage
    - |
      # Usar variables de GitLab con fallback a valores de TEST conocidos
      BASE_URL=${BASE_URL:-"https://apps-test.magiis.com"}
      AUTH_API_URL=${AUTH_API_URL:-""}
      
      echo "ENV=${ENV}" > .env.test
      echo "BASE_URL=${BASE_URL}" >> .env.test
      echo "AUTH_API_URL=${AUTH_API_URL:-\"\"}" >> .env.test
      echo "LOGIN_PATH=${LOGIN_PATH:-\"/#/authentication/login/carrier\"}" >> .env.test
      echo "DASHBOARD_URL_PATTERN=${DASHBOARD_URL_PATTERN:-\"dashboard\"}" >> .env.test
      echo "USER_CARRIER=${USER_CARRIER}" >> .env.test
      echo "PASS_CARRIER=${PASS_CARRIER}" >> .env.test
      echo "USER_CONTRACTOR=${USER_CONTRACTOR:-\"\"}" >> .env.test
      echo "PASS_CONTRACTOR=${PASS_CONTRACTOR:-\"\"}" >> .env.test
      echo "HEADLESS=true" >> .env.test
    - pnpm run test:test:smoke
    - pnpm run cleanup:test:travels || true
  artifacts:
    when: always
    paths:
      - evidence/test/
    reports:
      junit: evidence/test/junit.xml
    expire_in: 14 days

e2e-test:
  extends: .e2e_template
  environment:
    name: test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  variables:
    ENV: test

