name: Smoke Tests — PROD Environment

on:
  # Solo ejecución manual — no correr en push a main hasta que los flujos estén en producción
  workflow_dispatch:
    inputs:
      headed:
        description: 'Run with browser visible (headed mode)'
        required: false
        default: 'false'

jobs:
  smoke-prod:
    name: Smoke Tests PROD
    runs-on: ubuntu-latest
    environment: prod

    env:
      ENV: prod
      HEADLESS: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Playwright Browsers (chromium only)
      run: pnpm exec playwright install --with-deps chromium

    - name: Create storage directory
      run: mkdir -p storage

    - name: Create .env.prod from secrets
      run: |
        cat > .env.prod << 'ENVEOF'
        ENV=prod
        BASE_URL=${{ vars.BASE_URL }}
        AUTH_API_URL=${{ vars.AUTH_API_URL }}
        LOGIN_PATH="/#/authentication/login/carrier"
        DASHBOARD_URL_PATTERN="dashboard"
        USER_CARRIER=${{ secrets.USER_CARRIER }}
        PASS_CARRIER=${{ secrets.PASS_CARRIER }}
        HEADLESS=true
        ENVEOF
        # Validar que los secrets no estén vacíos
        if grep -q "^USER_CARRIER=$" .env.prod || grep -q "^PASS_CARRIER=$" .env.prod; then
          echo "❌ ERROR: USER_CARRIER o PASS_CARRIER vacíos en GitHub Secrets"
          echo "Configurar en: Settings → Secrets and variables → Actions"
          exit 1
        fi

    - name: Run Smoke Tests (PROD)
      run: pnpm run test:prod:smoke

    - name: Upload evidence (screenshots/videos on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: evidence-prod-${{ github.run_number }}
        path: evidence/prod/artifacts/
        retention-days: 30

    - name: Upload HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: report-prod-${{ github.run_number }}
        path: evidence/prod/report/
        retention-days: 30
