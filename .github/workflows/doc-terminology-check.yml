name: Doc Terminology Check

# Valida que la terminología canónica post-desambiguación (Fase 1-7) esté
# sincronizada en docs, specs y cobertura. Ver:
#   docs/gateway-pg/stripe/TRACEABILITY.md §5

# ⚠️ CI DESACTIVADO 2026-04-27 — decisión BL-035
# Triggers automáticos removidos. Sólo manual via workflow_dispatch.
# Para reactivar: restaurar pull_request + push del historial git.
on:
  workflow_dispatch:

jobs:
  terminology:
    name: E2E / Hold-Cobro terminology
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run terminology check
        run: node scripts/ai/check-doc-terminology.mjs
