name: E2E Tests — TEST Environment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      headed:
        description: 'Run with browser visible (headed)'
        required: false
        default: 'false'

jobs:
  e2e-test:
    name: E2E Tests (TEST)
    runs-on: ubuntu-latest
    environment: test

    env:
      ENV: test
      HEADLESS: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Create storage directory
        run: mkdir -p storage

      - name: Create .env.test from secrets
        run: |
          cat > .env.test << 'ENVEOF'
          ENV=test
          BASE_URL=${{ vars.BASE_URL }}
          AUTH_API_URL=${{ vars.AUTH_API_URL }}
          LOGIN_PATH="/#/authentication/login/carrier"
          DASHBOARD_URL_PATTERN="dashboard"
          USER_CARRIER=${{ secrets.USER_CARRIER }}
          PASS_CARRIER=${{ secrets.PASS_CARRIER }}
          HEADLESS=true
          ENVEOF

      - name: Run E2E Tests (TEST)
        run: pnpm run test:test

      - name: Upload evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-test-${{ github.run_number }}
          path: evidence/test/
          retention-days: 14

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-test-${{ github.run_number }}
          path: evidence/test/report/
          retention-days: 7
